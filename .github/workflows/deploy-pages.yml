# GitHub Pages deploy (GitHub-specific — uses the official Pages actions).
# Builds the docs site and publishes it on every push to main. The site aliases
# the package to ../src, so no separate library build is needed.
#
# One-time setup by the repo owner: Settings → Pages → Source = "GitHub Actions".
name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let the newest push win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      # Production build → base '/liquid-glass-react/' (see site/vite.config.ts).
      - name: Build site
        run: pnpm site:build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
